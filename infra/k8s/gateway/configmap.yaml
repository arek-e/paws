apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: paws
  labels:
    app.kubernetes.io/name: paws
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kubectl
data:
  PORT: '4000'
  NODE_ENV: 'production'
  # WORKER_URL is set in the Deployment to point at the worker ClusterIP service.
  # API_KEY must be supplied via a Secret and injected as an env var in the Deployment.
