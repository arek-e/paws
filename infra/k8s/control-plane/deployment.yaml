apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: paws
  labels:
    app.kubernetes.io/name: paws
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kubectl
spec:
  # Single replica for v0.1. Stateless — safe to scale horizontally in v0.2+.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paws
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paws
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: paws
      # Gateway is stateless and runs as non-root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: ghcr.io/arek-e/paws-control-plane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: NODE_ENV
            # Worker service DNS within the cluster.
            - name: WORKER_URL
              value: 'http://worker.paws.svc.cluster.local:3000'
            # API_KEY must be provisioned as a Secret named "paws-control-plane-secret"
            # with key "api-key" before deploying.
            # kubectl create secret generic paws-control-plane-secret --from-literal=api-key=<value> -n paws
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: paws-control-plane-secret
                  key: api-key
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
