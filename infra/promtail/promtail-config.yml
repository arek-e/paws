# Promtail config for docker-compose deployment.
# Discovers Docker containers and ships logs to Loki.

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers on the paws network
      - source_labels: ['__meta_docker_container_name']
        regex: '/paws-(.+)'
        target_label: container_name
        replacement: '$1'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
    pipeline_stages:
      # Try to parse JSON logs (structured logging from paws services)
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: time
      - labels:
          level:
      # Fall back to raw log line if not JSON
      - output:
          source: msg
