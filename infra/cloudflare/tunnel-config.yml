# Cloudflare Tunnel config for fleet.tpops.dev → gateway
#
# Setup:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. Login: cloudflared tunnel login
#   3. Create tunnel: cloudflared tunnel create paws-fleet
#   4. Route DNS: cloudflared tunnel route dns paws-fleet fleet.tpops.dev
#   5. Copy this config to ~/.cloudflared/config.yml (or pass via --config)
#   6. Run: cloudflared tunnel run paws-fleet
#
# The tunnel ID will be printed by `cloudflared tunnel create`.
# Replace <TUNNEL_ID> below.

tunnel: <TUNNEL_ID>
credentials-file: /root/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: fleet.tpops.dev
    service: http://localhost:4000
  - service: http_status:404
