# Dex OIDC Identity Provider for paws
#
# Usage:
#   cd infra/dex
#   docker compose up -d
#
# Then configure the gateway:
#   OIDC_ISSUER=http://localhost:5556/dex
#   OIDC_CLIENT_ID=paws-control-plane
#   OIDC_CLIENT_SECRET=paws-dex-secret-changeme
#   AUTH_SECRET=$(openssl rand -hex 16)

services:
  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    ports:
      - '5556:5556'
    volumes:
      - ./config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/data
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    restart: unless-stopped

volumes:
  dex-data:
