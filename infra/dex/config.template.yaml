# Dex OIDC config template for docker-compose deployment.
#
# Dex expands ${VAR} from environment variables at startup.
# Set these via docker-compose environment section:
#   DOMAIN, OIDC_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET

issuer: https://${DOMAIN}/dex

storage:
  type: sqlite3
  config:
    file: /data/dex.db

web:
  http: 0.0.0.0:5556

staticClients:
  - id: paws-control-plane
    name: paws
    redirectURIs:
      - https://${DOMAIN}/auth/callback
    secret: ${OIDC_CLIENT_SECRET}

connectors:
  - type: github
    id: github
    name: GitHub
    config:
      clientID: ${GITHUB_CLIENT_ID}
      clientSecret: ${GITHUB_CLIENT_SECRET}
      redirectURI: https://${DOMAIN}/dex/callback

