# /\_/\
# ( o.o )  paws control plane
#  > ^ <
#
# Architecture:
#   Caddy (:80/:443) → Gateway (:4000) — dashboard + API
#   Pangolin + Gerbil (:51820/udp) — worker WireGuard tunnels only
#   Traefik (Pangolin network) — tunnel subdomain routing for exposed ports
#
# The dashboard and API are served directly by the gateway behind Caddy.
# Pangolin is only used for worker tunnel connectivity and port exposure.

services:
  # ── Caddy (Reverse Proxy + Auto-HTTPS — enabled when domain is set) ──────
  caddy:
    image: caddy:2-alpine
    container_name: paws-caddy
    restart: unless-stopped
    profiles:
      - domain
    networks:
      - paws
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: '${DOMAIN:-localhost}'
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      gateway:
        condition: service_healthy

  # ── Gateway (Paws API + Dashboard) ───────────────────────────────────────
  # Directly accessible on port 3000 (HTTP). When a domain is configured,
  # Caddy sits in front on 80/443 and proxies to the gateway.
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    container_name: paws-control-plane
    restart: unless-stopped
    networks:
      - paws
    ports:
      - '3000:3000'
    volumes:
      - gateway-data:/var/lib/paws/data
    environment:
      PORT: '3000'
      API_KEY: '${API_KEY:-paws-dev-key}'
      WORKER_URL: '${WORKER_URL:-}'
      DASHBOARD_DIR: '/app/apps/dashboard/dist'
      PAWS_VERSION: '${PAWS_VERSION:-0.0.0}'
      # OIDC (configured when domain is set; on bare IP, use API key auth only)
      OIDC_ISSUER: '${OIDC_ISSUER:-}'
      OIDC_CLIENT_ID: '${OIDC_CLIENT_ID:-paws-control-plane}'
      OIDC_CLIENT_SECRET: '${OIDC_CLIENT_SECRET:-}'
      OIDC_REDIRECT_URI: '${OIDC_REDIRECT_URI:-}'
      OIDC_AUTH_EXTERNAL_URL: '${OIDC_AUTH_EXTERNAL_URL:-}'
      AUTH_SECRET: '${AUTH_SECRET:-change-me-to-a-random-32-char-string}'
      PANGOLIN_OIDC_SECRET: '${PANGOLIN_OIDC_SECRET:-}'
      # Pangolin discovery (for workers)
      PANGOLIN_API_URL: '${PANGOLIN_API_URL:-}'
      PANGOLIN_API_KEY: '${PANGOLIN_API_KEY:-}'
      PANGOLIN_ORG_ID: '${PANGOLIN_ORG_ID:-}'
      PANGOLIN_EMAIL: '${PANGOLIN_EMAIL:-}'
      PANGOLIN_PASSWORD: '${PANGOLIN_PASSWORD:-}'
      # Metrics
      VICTORIAMETRICS_URL: 'http://victoriametrics:8428'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Pangolin (Tunnel Management — enabled when workers are added) ─────────
  pangolin:
    image: fosrl/pangolin:latest
    container_name: paws-pangolin
    restart: unless-stopped
    networks:
      - paws
    volumes:
      - ./config/pangolin:/app/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/v1/']
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 15s

  # ── Gerbil (WireGuard Tunnel Server) ─────────────────────────────────────
  gerbil:
    image: fosrl/gerbil:latest
    container_name: paws-gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    networks:
      - paws
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ./config/pangolin:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - '51820:51820/udp'
      - '21820:21820/udp'

  # ── Traefik (Tunnel Subdomain Routing — for exposed VM ports only) ───────
  # Runs on Gerbil's network stack. Caddy forwards tunnel subdomains here.
  traefik:
    image: traefik:v3.6
    container_name: paws-traefik
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    network_mode: service:gerbil
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ./config/traefik:/etc/traefik:ro

  # ── Dex (OIDC Identity Provider) ─────────────────────────────────────────
  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    container_name: paws-dex
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '5556'
    volumes:
      - ./config/dex/config.yaml:/etc/dex/config.docker.yaml:ro
      - dex-data:/data
    environment:
      DOMAIN: '${DOMAIN:-localhost}'
      OIDC_CLIENT_SECRET: '${OIDC_CLIENT_SECRET:-paws-dex-secret-changeme}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'

  # ── VictoriaMetrics (Metrics Storage) ────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    container_name: paws-victoriametrics
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '8428'
    volumes:
      - vm-data:/victoria-metrics-data
      - ./infra/victoriametrics/scrape.compose.yml:/etc/victoria-metrics/scrape.yml:ro
    command:
      - '--storageDataPath=/victoria-metrics-data'
      - '--retentionPeriod=30d'
      - '--promscrape.config=/etc/victoria-metrics/scrape.yml'
      - '--httpListenAddr=:8428'

  # ── Grafana (Dashboards) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: paws-grafana
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '3001'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:-admin}'
      GF_SERVER_HTTP_PORT: '3001'
      GF_SERVER_ROOT_URL: 'https://${DOMAIN:-localhost}/grafana/'
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

networks:
  paws:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  dex-data:
  gateway-data:
  letsencrypt-data:
  vm-data:
  grafana-data:
