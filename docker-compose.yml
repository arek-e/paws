# /\_/\
# ( o.o )  paws control plane
#  > ^ <
#
# Full control plane: gateway + dashboard, Dex OIDC, Caddy reverse proxy,
# VictoriaMetrics metrics, Grafana dashboards.
#
# Usage:
#   cp .env.example .env   # edit with your values
#   docker compose up -d
#
# Architecture:
#   Internet -> Caddy (:80/:443) -> Gateway (:4000) / Dex (:5556) / Grafana (:3000)
#   VictoriaMetrics scrapes Gateway /metrics every 15s
#   Grafana reads from VictoriaMetrics

services:
  # ── Gateway (API + Dashboard) ──────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: paws-gateway
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '4000'
    environment:
      PORT: '4000'
      API_KEY: '${API_KEY:-paws-dev-key}'
      WORKER_URL: '${WORKER_URL:-}'
      DASHBOARD_DIR: '/app/apps/dashboard/dist'
      # OIDC — connects to Dex
      OIDC_ISSUER: 'http://dex:5556/dex'
      OIDC_CLIENT_ID: 'paws-gateway'
      OIDC_CLIENT_SECRET: '${OIDC_CLIENT_SECRET:-paws-dex-secret-changeme}'
      OIDC_REDIRECT_URI: 'https://${DOMAIN:-localhost}/auth/callback'
      OIDC_AUTH_EXTERNAL_URL: 'https://${DOMAIN:-localhost}'
      AUTH_SECRET: '${AUTH_SECRET:-change-me-to-a-random-32-char-string}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Dex (OIDC Identity Provider) ──────────────────────────────────────────
  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    container_name: paws-dex
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '5556'
    volumes:
      - ./infra/dex/config.template.yaml:/etc/dex/config.yaml:ro
      - dex-data:/data
    environment:
      DOMAIN: '${DOMAIN:-localhost}'
      OIDC_CLIENT_SECRET: '${OIDC_CLIENT_SECRET:-paws-dex-secret-changeme}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'

  # ── Caddy (Reverse Proxy + Auto-HTTPS) ────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: paws-caddy
    restart: unless-stopped
    networks:
      - paws
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: '${DOMAIN:-localhost}'
      GRAFANA_DOMAIN: '${GRAFANA_DOMAIN:-}'
    depends_on:
      gateway:
        condition: service_healthy

  # ── VictoriaMetrics (Metrics Storage) ─────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    container_name: paws-victoriametrics
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '8428'
    volumes:
      - vm-data:/victoria-metrics-data
      - ./infra/victoriametrics/scrape.compose.yml:/etc/victoria-metrics/scrape.yml:ro
    command:
      - '--storageDataPath=/victoria-metrics-data'
      - '--retentionPeriod=30d'
      - '--promscrape.config=/etc/victoria-metrics/scrape.yml'
      - '--httpListenAddr=:8428'

  # ── Grafana (Dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: paws-grafana
    restart: unless-stopped
    networks:
      - paws
    expose:
      - '3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:-admin}'
      GF_SERVER_ROOT_URL: 'https://${GRAFANA_DOMAIN:-grafana.localhost}/'
      GF_SERVER_SERVE_FROM_SUB_PATH: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

networks:
  paws:
    driver: bridge

volumes:
  dex-data:
  caddy-data:
  caddy-config:
  vm-data:
  grafana-data:
