name: Bug Report
description: Something broken? Let us know.
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: |
        Run this and paste the output:
        ```bash
        echo "OS: $(uname -sr)" && echo "Bun: $(bun --version 2>/dev/null || echo 'N/A')" && echo "Node: $(node --version 2>/dev/null || echo 'N/A')" && cat VERSION 2>/dev/null || echo "Version: unknown"
        ```
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots.
    validations:
      required: false
