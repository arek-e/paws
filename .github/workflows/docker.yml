name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONTROL_PLANE_IMAGE: ghcr.io/arek-e/paws-control-plane
  WORKER_IMAGE: ghcr.io/arek-e/paws-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: meta
        run: |
          VERSION=$(cat VERSION)
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Build and push control-plane
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/control-plane/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.CONTROL_PLANE_IMAGE }}:latest
            ${{ env.CONTROL_PLANE_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.CONTROL_PLANE_IMAGE }}:${{ steps.meta.outputs.commit }}
          build-args: |
            PAWS_VERSION=${{ steps.meta.outputs.version }}
            PAWS_COMMIT=${{ steps.meta.outputs.commit }}
            PAWS_BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.WORKER_IMAGE }}:${{ steps.meta.outputs.commit }}
          build-args: |
            PAWS_VERSION=${{ steps.meta.outputs.version }}
            PAWS_COMMIT=${{ steps.meta.outputs.commit }}
            PAWS_BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
