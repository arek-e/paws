name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: bun install
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Typecheck
        run: TURBO_NO_DAEMON=1 bunx turbo run typecheck --filter='!site'
        timeout-minutes: 5
      - name: Syncpack
        run: bunx syncpack lint
        timeout-minutes: 1
      - name: Test
        run: TURBO_NO_DAEMON=1 bunx turbo run test --filter='!site' --filter='!@paws/dashboard' --filter='!@paws/cli' ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        timeout-minutes: 5
      - name: Knip
        run: bun run knip
        timeout-minutes: 2
