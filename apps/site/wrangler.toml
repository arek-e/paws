name = "getpaws"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"

# KV namespace bindings for Cloudflare Pages Functions
# Create these in the Cloudflare dashboard: Workers & Pages -> KV
# Then bind them in: Pages project -> Settings -> Functions -> KV namespace bindings
#
# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "<your-waitlist-kv-namespace-id>"
#
# [[kv_namespaces]]
# binding = "CONTACT_SUBMISSIONS"
# id = "<your-contact-submissions-kv-namespace-id>"
