id: agent-browser
base:
  kernel: /var/lib/paws/kernels/vmlinux-default
  rootfs: /var/lib/paws/rootfs/ubuntu-default.ext4
vcpu: 2
memory_mb: 4096
setup: |
  #!/bin/bash
  set -euo pipefail
  apt-get update
  apt-get install -y --no-install-recommends \
    curl git ca-certificates openssh-server \
    chromium-browser nodejs npm
  curl -fsSL https://bun.sh/install | bash

  # Install ws package globally for CDP WebSocket communication
  npm install -g ws

  # SSH config
  echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
  systemctl enable ssh

  # Create a helper script to start headless Chromium with CDP
  cat > /usr/local/bin/start-browser <<'BROWSER'
  #!/bin/bash
  # Start headless Chromium with remote debugging on port 9222
  chromium-browser \
    --headless \
    --no-sandbox \
    --disable-gpu \
    --disable-dev-shm-usage \
    --remote-debugging-address=0.0.0.0 \
    --remote-debugging-port=9222 \
    --window-size=1280,720 \
    "${1:-about:blank}" &
  echo "Chromium started on :9222"
  BROWSER
  chmod +x /usr/local/bin/start-browser
